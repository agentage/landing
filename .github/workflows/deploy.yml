name: Deploy

# Build -> e2e-gate (against the built prod image) -> deploy straight to prod.
# Hardened: runs only on push to master / manual dispatch (never fork PRs);
# the deploy job is gated on the protected `production` Environment AND a
# DEPLOY_ENABLED repo variable, so merging this before secrets exist is inert
# (build + gate still run and validate the image).
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/agentage/landing/site

jobs:
  build:
    name: 🏗️ Build image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE }}:prod-${{ github.sha }}
            ${{ env.IMAGE }}:prod-latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  e2e-gate:
    name: 🎭 E2E gate (prod image)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Run the just-built image with no SITE_FQDN - it must default to the prod
      # apex (agentage.io). Asserts against that host: validates the exact
      # artifact AND that an unconfigured container serves prod, as it ships.
      - name: Start prod image
        run: |
          docker run -d --name landing -p 3100:3000 "${IMAGE}:prod-${GITHUB_SHA}"
          for i in $(seq 1 30); do
            [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3100/)" = "200" ] && break
            sleep 1
          done
          curl -fsS -o /dev/null http://localhost:3100/ || { docker logs landing; exit 1; }
      - name: E2E vs prod image
        env:
          LANDING_BASE_URL: http://localhost:3100
          LANDING_EXPECTED_HOST: agentage.io
        run: npm run test:e2e
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-gate-report
          path: |
            playwright-report/
            packages/*/test-results/
          retention-days: 7

  deploy:
    name: 🚀 Deploy to prod
    needs: e2e-gate
    # Inert until DEPLOY_ENABLED is set (after the deploy key + secrets land).
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          host: ${{ secrets.SSH_HOST }}
      - name: Render compose
        env:
          SITE_FQDN: ${{ vars.SITE_FQDN || 'agentage.io' }}
          IMAGE_TAG: prod-${{ github.sha }}
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          envsubst '${SITE_FQDN} ${IMAGE_TAG} ${GA_MEASUREMENT_ID}' < docker-compose.yml > docker-compose.deploy.yml
          if grep -E '\$\{(SITE_FQDN|IMAGE_TAG|GA_MEASUREMENT_ID)' docker-compose.deploy.yml; then
            echo "::error::unresolved variable in docker-compose.deploy.yml"; exit 1
          fi
      - name: Copy compose to host
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /opt/agentage/landing"
          scp docker-compose.deploy.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/agentage/landing/docker-compose.yml
      - name: Login to GHCR on host
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "docker login ghcr.io -u ${{ github.actor }} --password-stdin"
      - name: Deploy stack
        run: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /opt/agentage/landing && docker stack deploy -c docker-compose.yml agentage-landing --with-registry-auth"
      - name: Wait + live smoke
        env:
          SITE_FQDN: ${{ vars.SITE_FQDN || 'agentage.io' }}
        run: |
          for i in $(seq 1 40); do
            [ "$(curl -s -o /dev/null -w '%{http_code}' "https://${SITE_FQDN}/")" = "200" ] && break
            sleep 5
          done
          echo "Smoke: https://${SITE_FQDN}/"
          curl -fsS "https://${SITE_FQDN}/" | grep -q "For every AI" || { echo "::error::apex missing hero copy"; exit 1; }
          robots=$(curl -fsS "https://${SITE_FQDN}/robots.txt")
          echo "$robots" | grep -qi "Sitemap:" || { echo "::error::prod robots missing Sitemap"; exit 1; }
          echo "$robots" | grep -qiE '^\s*Disallow:\s*/\s*$' && { echo "::error::prod robots blanket-disallow"; exit 1; }
          echo "✅ prod serving + indexable"
