name: Setup SSH
description: Load the deploy key into ssh-agent and trust the target host.

inputs:
  ssh-private-key:
    description: Private key for the deploy user.
    required: true
  host:
    description: Host added to known_hosts.
    required: true

runs:
  using: composite
  steps:
    - uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
    - name: Trust host
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
      run: ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
